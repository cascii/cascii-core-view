name: Publish crates.io

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run publish validation without uploading to crates.io"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish-crates
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish current crate version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show crate version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "Publishing cascii-core-view v${VERSION}"

      - name: Validate package
        run: cargo publish --dry-run --locked

      - name: Publish to crates.io
        if: ${{ !inputs.dry_run }}
        run: cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
